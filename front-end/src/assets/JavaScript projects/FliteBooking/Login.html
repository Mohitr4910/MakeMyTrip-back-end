<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="Login.css">
    <title>Document</title>
</head>

<body>
<div class="mainlogin">
    <form>
        <h2>Login</h2>
      
        <label>Email</label>
        <p id="err-loginemail"></p>
        <input id="loginemail" type="text" placeholder="Enter your email">
        
       <label>Password</label>
        <p id="err-loginpass"></p>
        <input id="loginpass" type="text" placeholder="Enter your password">
        
        
        <button onclick=" return Login()"  type="submit">Login</button>
        <p class="signup">Don't have an account? <a href="SignUp.html">SignUp</a></p>
        
    </form>
</div>
<script>
    window.addEventListener("load",()=>{
        document.body.style.opacity="1"
    })
</script>

  <script src="main.js"></script>
</body>

</html>
